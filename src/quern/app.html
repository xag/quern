<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quern navigator</title>
<style>
:root {
  --bg: #ffffff; --bg2: #f5f4f1; --bg3: #ecebe7; --fg: #1d1c1a; --fg2: #6b6862;
  --line: #dcdad4; --accent: #2f6fed; --ok: #178a4c; --bad: #c73030;
  --measured: #178a4c; --inferred: #b07a1e; --design-target: #2f6fed;
  --derived: #7a4fd0; --chip: #e8e6e1;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16161a; --bg2: #1e1e24; --bg3: #26262e; --fg: #e8e6e1; --fg2: #98958d;
    --line: #33333c; --accent: #6b9aff; --ok: #4cc38a; --bad: #ee6a6a;
    --measured: #4cc38a; --inferred: #d9a44a; --design-target: #6b9aff;
    --derived: #a88bea; --chip: #2c2c35;
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg);
  font: 13px/1.45 ui-sans-serif, system-ui, sans-serif; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden; }
code, .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
header { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-bottom: 1px solid var(--line); background: var(--bg2); flex: none; }
#wslabel { font-weight: 600; }
.chip { background: var(--chip); border-radius: 10px; padding: 1px 8px;
  font-size: 11px; white-space: nowrap; }
.kind { color: var(--accent); font-weight: 600; }
#crumbs { flex: 1; min-width: 0; overflow: hidden; white-space: nowrap;
  text-overflow: ellipsis; }
#crumbs a { color: var(--fg2); text-decoration: none; cursor: pointer; }
#crumbs a:hover { color: var(--accent); }
#crumbs .sep { color: var(--line); margin: 0 3px; }
#crumbs .here { color: var(--fg); font-weight: 600; }
#searchbox { position: relative; }
#search { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
  border-radius: 6px; padding: 4px 8px; width: 230px; outline: none; }
#search:focus { border-color: var(--accent); }
#hits { position: absolute; right: 0; top: 30px; width: 340px; max-height: 320px;
  overflow: auto; background: var(--bg2); border: 1px solid var(--line);
  border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,.18); display: none; z-index: 20; }
#hits .hit { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid var(--line); }
#hits .hit:hover { background: var(--bg3); }
main { flex: 1; display: flex; min-height: 0; }
#tree { width: 300px; flex: none; overflow: auto; border-right: 1px solid var(--line);
  padding: 8px 4px; }
.tnode { user-select: none; }
.trow { display: flex; align-items: center; gap: 4px; padding: 2px 6px;
  border-radius: 6px; cursor: pointer; white-space: nowrap; }
.trow:hover { background: var(--bg3); }
.trow.sel { background: var(--bg3); outline: 1px solid var(--line); }
.twist { width: 14px; flex: none; color: var(--fg2); font-size: 10px; text-align: center; }
/* The id takes whatever the markers don't, so `!ungrounded` and RED land in a column at
   the right edge instead of chasing each id's length — a scan down the pane reads the
   flags without reading the names. */
.tid { overflow: hidden; text-overflow: ellipsis; flex: 1 1 auto; min-width: 0; }
.tkind { font-size: 10px; color: var(--accent); }
.tkids { margin-left: 14px; }
/* Kind groups: the outline's one concession to there being a lot of one thing.
   The header is a label, never a node — clicking it collapses, it never navigates. */
.tgrouphead { display: flex; align-items: center; gap: 6px; padding: 3px 6px;
  margin-top: 4px; cursor: pointer; border-radius: 6px; font-size: 11px;
  text-transform: uppercase; letter-spacing: .06em; color: var(--fg2); }
.tgrouphead:hover { background: var(--bg3); }
.tgrouphead .gname { color: var(--accent); }
.tgrouphead .gcount { margin-left: auto; }
/* Row markers, read off the node exactly as the CLI brief reads them: `!x` is an
   ungrounded param (--inferred is the palette's not-yet-measured amber), RED is a
   failing rule. */
.tflag { font-size: 10px; color: var(--inferred); flex: none; }
.tred { font-size: 10px; color: var(--bad); flex: none; font-weight: 600; }
#node { flex: 1; min-width: 0; overflow: auto; padding: 16px 20px; }
#side { width: 320px; flex: none; overflow: auto; border-left: 1px solid var(--line);
  background: var(--bg2); display: flex; flex-direction: column; }
.tabs { display: flex; border-bottom: 1px solid var(--line); flex: none; }
.tabs button { flex: 1; background: none; border: none; color: var(--fg2);
  padding: 8px; cursor: pointer; font: inherit; border-bottom: 2px solid transparent; }
.tabs button.on { color: var(--fg); border-bottom-color: var(--accent); }
.tab { display: none; padding: 10px; overflow: auto; }
.tab.on { display: block; }
h1 { font-size: 17px; margin: 0 0 2px; }
h1[contenteditable]:focus { outline: 1px solid var(--accent); border-radius: 4px; }
.path { color: var(--fg2); margin-bottom: 10px; }
.kinddesc { background: var(--bg2); border-left: 3px solid var(--accent);
  padding: 8px 10px; border-radius: 0 6px 6px 0; color: var(--fg2);
  font-style: italic; margin: 10px 0; }
section.block { margin: 16px 0; }
.blockhead { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.blockhead h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--fg2); margin: 0; }
.blockhead button { margin-left: auto; }
table { border-collapse: collapse; width: 100%; }
td, th { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--line);
  vertical-align: top; }
th { font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--fg2); font-weight: 600; }
tr.rowbtn { cursor: pointer; }
tr.rowbtn:hover td { background: var(--bg3); }
.prov { border-radius: 9px; padding: 0 7px; font-size: 10px; color: #fff;
  background: var(--fg2); white-space: nowrap; }
.prov.measured { background: var(--measured); }
.prov.inferred { background: var(--inferred); }
.prov.design-target { background: var(--design-target); }
.prov.derived { background: var(--derived); }
.gr { cursor: help; }
.linkchip { display: inline-block; margin: 2px 4px 2px 0; cursor: pointer; }
.linkchip:hover { color: var(--accent); }
pre.payload { background: var(--bg2); border: 1px solid var(--line);
  border-radius: 8px; padding: 10px; overflow: auto; margin: 0; max-height: 260px; }
button { background: var(--bg3); color: var(--fg); border: 1px solid var(--line);
  border-radius: 6px; padding: 3px 10px; cursor: pointer; font: inherit; font-size: 12px; }
button:hover { border-color: var(--accent); }
button.danger { color: var(--bad); }
.kidrow { display: flex; gap: 8px; align-items: baseline; padding: 5px 8px;
  border-radius: 6px; cursor: pointer; }
.kidrow:hover { background: var(--bg3); }
.muted { color: var(--fg2); }
.kindcard { border-bottom: 1px solid var(--line); padding: 8px 2px; }
.kindcard .kind { font-size: 13px; }
.kindcard dl { margin: 6px 0 0; }
.kindcard dt { font-weight: 600; font-size: 12px; }
.kindcard dd { margin: 0 0 4px 10px; color: var(--fg2); }
.rulecard { border-bottom: 1px solid var(--line); padding: 8px 2px; }
.rulecard code { display: block; background: var(--bg3); border-radius: 6px;
  padding: 6px 8px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
#checkout .line { padding: 2px 4px; border-radius: 4px; }
#checkout .PASS { color: var(--ok); }
#checkout .FAIL { color: var(--bad); font-weight: 600; }
dialog { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
  border-radius: 10px; padding: 16px; min-width: 380px; max-width: 90vw; }
dialog::backdrop { background: rgba(0,0,0,.35); }
dialog h3 { margin: 0 0 12px; font-size: 14px; }
dialog label { display: block; margin: 8px 0 2px; font-size: 11px;
  text-transform: uppercase; letter-spacing: .06em; color: var(--fg2); }
dialog input, dialog select, dialog textarea { width: 100%; background: var(--bg2);
  color: var(--fg); border: 1px solid var(--line); border-radius: 6px;
  padding: 5px 8px; font: inherit; }
dialog textarea { font-family: ui-monospace, Consolas, monospace; min-height: 160px; }
dialog .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.err { color: var(--bad); margin-top: 8px; }
#status { position: fixed; bottom: 10px; right: 10px; background: var(--bg3);
  border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px;
  font-size: 11px; color: var(--fg2); opacity: 0; transition: opacity .3s; }
#status.show { opacity: 1; }
.stale { opacity: .5; }
.stalebanner { background: var(--bg2); border-left: 3px solid var(--fg2);
  padding: 6px 10px; margin: 8px 0; font-size: 12px; color: var(--fg2); }
.treebar { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 11px;
  color: var(--fg2); padding: 4px 6px; user-select: none; }
.treebar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.linkmeaning { font-size: 11px; margin: 1px 0 4px 12px; }
</style>
</head>
<body>
<header>
  <span id="wslabel" class="chip">quern</span>
  <nav id="crumbs"></nav>
  <div id="searchbox">
    <input id="search" placeholder="search id, kind, name, meta…" autocomplete="off">
    <div id="hits"></div>
  </div>
</header>
<main>
  <aside id="tree"></aside>
  <section id="node"><p class="muted">loading…</p></section>
  <aside id="side">
    <div class="tabs">
      <button data-tab="kindstab" class="on">Kinds</button>
      <button data-tab="rulestab">Rules</button>
      <button data-tab="checktab">Check</button>
    </div>
    <div id="kindstab" class="tab on"></div>
    <div id="rulestab" class="tab"></div>
    <div id="checktab" class="tab">
      <button id="runcheck">run rules on this branch</button>
      <div id="checkout"></div>
    </div>
  </aside>
</main>
<dialog id="dlg"></dialog>
<div id="status"></div>

<script type="module">
/* The quern semantic navigator.
   Two transports behind one `call(tool, args)`:
   - embedded as an MCP App (SEP-1865): @modelcontextprotocol/ext-apps bridge,
     callServerTool against the same generic tree_* verbs the model uses;
   - standalone in a browser: POST /rpc on the dev server (quern.app_host.serve_dev),
     same verbs, same result envelope. One tree, two hands on it. */

const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let mode = null, mcpApp = null;
let current = { path: "", node: null, semantics: {} };
const cache = new Map();     // path -> node slice (depth 2)
const expanded = new Set([""]);
let staleSet = new Set();    // paths some node supersedes — not current belief
let hideStale = false;       // the "current only" outline toggle
const collapsedKinds = new Set();   // kind -> folded away in the outline
let groupsPrimed = false;    // have the groups been folded shut for the first paint?
let redByPath = new Map();   // path -> [failing rule names]

function norm(r) {
  if (!r) return null;
  if (r.structuredContent) return r.structuredContent;
  const t = r.content?.[0]?.text;
  if (t !== undefined) { try { return JSON.parse(t); } catch { return { text: t }; } }
  return r;
}

async function initBridge() {
  if (window.parent !== window) {
    try {
      const m = await import("https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps@1/dist/index.mjs");
      mcpApp = new m.App({ name: "quern navigator", version: "1.0.0" });
      mcpApp.ontoolresult = r => { const d = norm(r); if (d && d.id !== undefined) boot(d); };
      await mcpApp.connect();
      mode = "mcp";
      return;
    } catch (e) { console.warn("MCP bridge unavailable, falling back to HTTP", e); }
  }
  mode = "http";
}

async function call(name, args) {
  if (mode === "mcp")
    return norm(await mcpApp.callServerTool({ name, arguments: args }));
  const res = await fetch("/rpc", { method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ name, arguments: args }) });
  return norm(await res.json());
}

function flash(msg, bad=false) {
  const el = $("#status");
  el.textContent = msg; el.style.color = bad ? "var(--bad)" : "";
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

/* Every write goes through the commit gate: the committed tree's red set never
   changes silently. A change-set that would create reds comes back refused, whole;
   the author sees them by name and either fixes the change or commits deliberately —
   and the acknowledgment is recorded on the tree, not just clicked away. */
async function commit(changes, okMsg) {
  let r = await call("tree_commit", { changes });
  if (r?.error) throw new Error(r.error);
  if (r && r.committed === false) {
    const reds = (r.refused || []).map(x => "  RED " + x.red + (x.detail ? ` — ${x.detail}` : ""));
    const ok = confirm("This change makes check(s) go RED:\n\n" + reds.join("\n") +
      "\n\nCommit anyway? Each red is acknowledged by name and recorded on the tree.");
    if (!ok) return false;
    r = await call("tree_commit",
      { changes, acknowledge: (r.refused || []).map(x => x.red) });
    if (r?.error) throw new Error(r.error);
    if (r && r.committed === false)
      throw new Error("still refused — the red set moved underneath you; reload and retry");
  }
  if (okMsg) flash(okMsg + (r?.acknowledged?.length ? " — red acknowledged, recorded" : ""));
  return true;
}

/* ---------- navigation ---------- */

async function go(path) {
  const d = await call("tree_get", { path, depth: 2 });
  if (!d || d.error) { flash(d?.error || "load failed", true); return; }
  cache.set(path, d);
  if (d.superseded) staleSet = new Set(d.superseded);
  current = { path, node: d, semantics: d.semantics || {} };
  expanded.add(path);
  revealGroup(path);
  renderAll();
}

function childPath(base, id) { return base ? base + "/" + id : id; }

/* ---------- left pane: outline ---------- */

/* The reds, for the outline's markers. tree_get says nothing about rule verdicts — it
   is a read, and evaluating every rule on every navigation would make browsing cost a
   check. So the verdicts are fetched once, here, and parsed out of tree_check's report
   (`FAIL <rule> @ <path> (detail)`). Parsing a human report is the weak seam in this;
   it is contained to this one function, and a format change costs the markers, never
   the outline. */
async function refreshReds() {
  const r = await call("tree_check", { path: "" });
  const text = r?.text ?? "";
  const next = new Map();
  for (const line of String(text).split("\n")) {
    const m = /^FAIL\s+(\S+)\s+@\s+(\S+)/.exec(line.trim());
    if (m) next.set(m[2], [...(next.get(m[2]) || []), m[1]]);
  }
  redByPath = next;
}

function renderTree() {
  const rootSlice = cache.get("") || (current.path === "" ? current.node : null);
  const el = $("#tree"); el.innerHTML = "";
  if (!rootSlice) return;

  if (staleSet.size) {
    const bar = document.createElement("div");
    bar.className = "treebar";
    bar.innerHTML =
      `<label title="hide entries another node supersedes — the archaeology stays in the tree">
         <input type="checkbox" id="curonly" ${hideStale ? "checked" : ""}>
         current only <span class="muted">(${staleSet.size})</span></label>`;
    bar.querySelector("#curonly").onchange = e => { hideStale = e.target.checked; renderTree(); };
    el.appendChild(bar);
  }

  // Grouping applies to the TOP level only. Deeper, an entry has a handful of children
  // and grouping them would add a layer of chrome to hide two rows behind.
  el.appendChild(grouped(rootSlice, ""));
}

/* The group holding `path`, opened. Navigation can arrive from anywhere — a search hit, a
   link chip in the centre panel, a crumb — and landing on a node whose group is shut
   would leave the outline looking untouched, with the selection hidden inside a fold. */
function revealGroup(path) {
  const top = String(path || "").split("/")[0];
  if (!top) return;
  const root = cache.get("");
  const entry = (root?.children || []).find(c => c.id === top);
  if (entry) collapsedKinds.delete(entry.kind || "—");
}

/* Top-level children, bucketed by kind. Order is first-appearance, not alphabetical:
   authoring order is information (a ledger is roughly chronological), and re-sorting it
   would be the viewer asserting a precedence among kinds it is not allowed to know. */
function grouped(node, path) {
  const wrap = document.createElement("div"); wrap.className = "tnode";
  const buckets = new Map();
  for (const c of node.children || []) {
    const p = childPath(path, c.id);
    if (staleSet.has(p) && hideStale) continue;
    const k = c.kind || "—";
    if (!buckets.has(k)) buckets.set(k, []);
    buckets.get(k).push(c);
  }
  if (!buckets.size) return wrap;

  // Shut on the first paint. A ledger opens as its own table of contents — four kind
  // headers with their counts — and the reader chooses what to unfold, rather than
  // being handed forty rows and asked to find the shape in them.
  if (!groupsPrimed) {
    groupsPrimed = true;
    for (const k of buckets.keys()) collapsedKinds.add(k);
    revealGroup(current.path);   // unless a path was already selected: show where we are
  }

  if (buckets.size === 1) return outline(node, path);  // one kind: grouping buys nothing

  for (const [kind, kids] of buckets) {
    const folded = collapsedKinds.has(kind);
    const reds = kids.filter(c => (redByPath.get(childPath(path, c.id)) || []).length).length;
    const head = document.createElement("div");
    head.className = "tgrouphead";
    head.innerHTML = `<span class="twist">${folded ? "▸" : "▾"}</span>
      <span class="gname">${esc(kind)}</span>
      <span class="gcount">${kids.length}${reds ? ` · <span class="tred">${reds} RED</span>` : ""}</span>`;
    head.onclick = () => {
      folded ? collapsedKinds.delete(kind) : collapsedKinds.add(kind);
      renderTree();
    };
    wrap.appendChild(head);
    if (!folded) wrap.appendChild(outline({ children: kids }, path, true));
  }
  return wrap;
}

/* `hideKind` drops the per-row kind chip when a group header already names it, and is an
   argument rather than global state because grouping is a TOP-LEVEL device: nested rows
   (a decision's alternatives, a debt's discharge) are never grouped, so their chip is the
   only thing telling them apart and has to survive. */
function outline(node, path, hideKind = false) {
  const kinds = current.semantics.kinds || {};
  const wrap = document.createElement("div"); wrap.className = "tnode";
  for (const c of node.children || []) {
    const p = childPath(path, c.id);
    const stale = staleSet.has(p);
    if (stale && hideStale) continue;
    const row = document.createElement("div");
    row.className = "trow" + (p === current.path ? " sel" : "") + (stale ? " stale" : "");
    if (stale) row.title = "superseded — no longer current belief";
    const hasKids = (c.children || []).length || cache.get(p)?.children?.length;
    // The same two markers the CLI brief puts on every line, so the outline carries the
    // signal without a click: an ungrounded param is the unsound value an entry carries,
    // and it is exactly what a gate reads to refuse.
    const hollow = Object.entries(c.params || {})
      .filter(([, q]) => q && q.grounded === false).map(([k]) => k).sort();
    const red = redByPath.get(p) || [];
    row.innerHTML = `<span class="twist">${hasKids ? (expanded.has(p) ? "▾" : "▸") : ""}</span>
      <span class="tid mono">${esc(c.id)}</span>
      ${c.kind && !hideKind ? `<span class="tkind" title="${esc(kinds[c.kind]?.description || "")}">${esc(c.kind)}</span>` : ""}
      ${hollow.length ? `<span class="tflag" title="ungrounded — the unsound value this entry carries">!${esc(hollow.join(","))}</span>` : ""}
      ${red.length ? `<span class="tred" title="${esc(red.join(", "))}">RED</span>` : ""}`;
    row.onclick = async e => {
      if (e.target.classList.contains("twist") && hasKids) {
        expanded.has(p) ? expanded.delete(p) : expanded.add(p);
        if (expanded.has(p) && !cache.get(p)) {
          const d = await call("tree_get", { path: p, depth: 2 });
          if (d && !d.error) cache.set(p, d);
        }
        renderTree();
      } else go(p);
    };
    wrap.appendChild(row);
    if (expanded.has(p)) {
      const slice = cache.get(p) || c;
      const kids = document.createElement("div"); kids.className = "tkids";
      kids.appendChild(outline(slice, p));
      wrap.appendChild(kids);
    }
  }
  return wrap;
}

/* ---------- center: the node ---------- */

function provBadge(q) {
  const label = q.provenance || "";
  const known = ["measured","inferred","design-target","derived"].includes(label);
  const g = q.grounded
    ? `<span class="gr" title="grounded: an observation you may act on">●</span>`
    : `<span class="gr muted" title="not grounded">○</span>`;
  return `<span class="prov ${known ? label : ""}">${esc(label || "?")}</span> ${g}`;
}

function renderNode() {
  const n = current.node, path = current.path;
  const kinds = current.semantics.kinds || {};
  const kd = n.kind ? kinds[n.kind] : null;
  const el = $("#node");

  const params = Object.entries(n.params || {});
  const links = Object.entries(n.links || {});
  const linkedFrom = Object.entries(n.linked_from || {});
  const supersededBy = (n.linked_from || {}).supersedes || [];
  const payload = n.payload || {};
  const meta = n.meta || {};
  const kids = n.children || [];

  el.innerHTML = `
    <h1 id="nname" contenteditable="plaintext-only" spellcheck="false"
        title="click to edit the name">${esc(n.name || n.id || "(root)")}</h1>
    <div class="path mono">${esc(path || "/")}
      ${n.kind ? `&nbsp;<span class="chip kind">${esc(n.kind)}</span>` : ""}</div>
    ${supersededBy.length ? `<div class="stalebanner">superseded — no longer current belief.
      Replaced by ${supersededBy.map(t =>
        `<span class="chip mono linkchip" data-go="${esc(t)}">${esc(t)}</span>`).join(" ")}</div>` : ""}
    ${kd ? `<div class="kinddesc">${esc(kd.description || "")}</div>` : ""}

    <section class="block"><div class="blockhead"><h2>Params</h2>
      <button id="addparam">+ param</button></div>
      ${params.length ? `<table><tr><th>name</th><th>value</th><th>provenance</th><th>source</th></tr>
        ${params.map(([k, q]) => `<tr class="rowbtn" data-param="${esc(k)}"
            title="${esc(kd?.params?.[k] || "")}">
          <td class="mono">${esc(k)}</td>
          <td>${esc(q.value)}${q.unit ? " " + esc(q.unit) : ""}${q.tolerance != null ? ` <span class="muted">±${esc(q.tolerance)}</span>` : ""}</td>
          <td>${provBadge(q)}</td>
          <td class="muted">${esc(q.source || "")}</td></tr>`).join("")}
      </table>` : `<span class="muted">none</span>`}
    </section>

    <section class="block"><div class="blockhead"><h2>Links</h2>
      <button id="addlink">+ link</button></div>
      ${links.length ? links.map(([name, targets]) => `<div>
        <span class="muted" title="${esc(kd?.links?.[name] || "")}">${esc(name)}:</span>
        ${targets.map(t => `<span class="chip mono linkchip${staleSet.has(t) ? " stale" : ""}" data-go="${esc(t)}">${esc(t)}</span>`).join(" ")}
        ${kd?.links?.[name] ? `<div class="linkmeaning muted">${esc(kd.links[name])}</div>` : ""}
      </div>`).join("") : `<span class="muted">none</span>`}
    </section>

    ${linkedFrom.length ? `<section class="block"><div class="blockhead"><h2>Linked here</h2></div>
      ${linkedFrom.map(([name, sources]) => `<div>
        <span class="muted" title="nodes whose '${esc(name)}' names this one">&larr; ${esc(name)}:</span>
        ${sources.map(s => `<span class="chip mono linkchip${staleSet.has(s) ? " stale" : ""}" data-go="${esc(s)}">${esc(s)}</span>`).join(" ")}
      </div>`).join("")}
    </section>` : ""}

    <section class="block"><div class="blockhead"><h2>Payload</h2>
      <button id="editpayload">edit</button></div>
      ${Object.keys(payload).length
        ? `<pre class="payload mono">${esc(JSON.stringify(payload, null, 1))}</pre>`
        : `<span class="muted">empty</span>`}
    </section>

    <section class="block"><div class="blockhead"><h2>Meta</h2>
      <button id="editmeta">edit</button></div>
      ${Object.keys(meta).length
        ? Object.entries(meta).map(([k, v]) => `<span class="chip">${esc(k)} = ${esc(v)}</span> `).join("")
        : `<span class="muted">empty</span>`}
    </section>

    <section class="block"><div class="blockhead"><h2>Children (${kids.length})</h2>
      <button id="addchild">+ child</button></div>
      ${kids.map(c => `<div class="kidrow" data-go="${esc(childPath(path, c.id))}"
          title="${esc(kinds[c.kind]?.description || "")}">
        <span class="mono">${esc(c.id)}</span>
        ${c.kind ? `<span class="chip kind">${esc(c.kind)}</span>` : ""}
        <span class="muted">${esc(c.name || "")}</span></div>`).join("")}
    </section>

    <section class="block">
      ${path ? `<button id="delnode" class="danger">delete this node</button>` : ""}
    </section>`;

  el.querySelectorAll("[data-go]").forEach(x => x.onclick = () => go(x.dataset.go));
  $("#nname").onblur = async () => {
    const name = $("#nname").textContent.trim();
    if (path && name !== (n.name || "")) {
      if (await commit([{ op: "set", path, node: { name } }], "name saved")) refresh();
    }
  };
  el.querySelectorAll("tr[data-param]").forEach(tr =>
    tr.onclick = () => paramDialog(tr.dataset.param, (n.params || {})[tr.dataset.param]));
  $("#addparam").onclick = () => paramDialog("", null);
  $("#addlink").onclick = () => linkDialog();
  $("#editpayload").onclick = () => jsonDialog("payload", payload);
  $("#editmeta").onclick = () => jsonDialog("meta", meta);
  $("#addchild").onclick = () => childDialog();
  const del = $("#delnode");
  if (del) del.onclick = async () => {
    if (!confirm(`Delete '${path}' and its whole branch?`)) return;
    if (!await commit([{ op: "delete", path }], "deleted")) return;
    cache.clear(); go(path.split("/").slice(0, -1).join("/"));
  };
}

async function refresh() { cache.delete(current.path); await go(current.path); }

/* ---------- dialogs ---------- */

function openDialog(html, onsubmit) {
  const dlg = $("#dlg");
  dlg.innerHTML = html + `<div class="actions">
    <button value="cancel">cancel</button><button id="dlgok">save</button></div>
    <div class="err" id="dlgerr"></div>`;
  dlg.showModal();
  $("#dlgok").onclick = async () => {
    try { await onsubmit(dlg); dlg.close(); }
    catch (e) { $("#dlgerr").textContent = String(e.message || e); }
  };
  dlg.querySelector("[value=cancel]").onclick = () => dlg.close();
}

function paramDialog(name, q) {
  openDialog(`<h3>${name ? "edit param" : "new param"}</h3>
    <label>name</label><input id="f_name" value="${esc(name)}" ${name ? "disabled" : ""}>
    <label>value</label><input id="f_value" type="number" step="any" value="${esc(q?.value ?? "")}">
    <label>unit</label><input id="f_unit" value="${esc(q?.unit ?? "")}">
    <label>provenance</label><input id="f_prov" list="provs" value="${esc(q?.provenance ?? "measured")}">
    <datalist id="provs"><option>measured</option><option>inferred</option>
      <option>design-target</option><option>derived</option></datalist>
    <label>tolerance (optional)</label><input id="f_tol" type="number" step="any" value="${esc(q?.tolerance ?? "")}">
    <label>source (optional)</label><input id="f_src" value="${esc(q?.source ?? "")}">`,
    async () => {
      const pname = $("#f_name").value.trim();
      if (!pname) throw new Error("name required");
      const quantity = {
        value: parseFloat($("#f_value").value),
        unit: $("#f_unit").value, provenance: $("#f_prov").value };
      if (Number.isNaN(quantity.value)) throw new Error("value must be a number");
      if ($("#f_tol").value) quantity.tolerance = parseFloat($("#f_tol").value);
      if ($("#f_src").value) quantity.source = $("#f_src").value;
      if (await commit([{ op: "set", path: current.path,
        node: { params: { ...(current.node.params || {}), [pname]: quantity } } }],
        "param saved")) refresh();
    });
}

function linkDialog() {
  openDialog(`<h3>add link</h3>
    <label>link name</label><input id="f_lname" placeholder="preuve, cause, uses…">
    <label>target path</label><input id="f_ltarget" class="mono" placeholder="a/b/c">`,
    async () => {
      const lname = $("#f_lname").value.trim(), t = $("#f_ltarget").value.trim();
      if (!lname || !t) throw new Error("both fields required");
      const links = { ...(current.node.links || {}) };
      links[lname] = [...(links[lname] || []), t];
      if (await commit([{ op: "set", path: current.path, node: { links } }],
        "link added")) refresh();
    });
}

function jsonDialog(field, obj) {
  openDialog(`<h3>edit ${field}</h3>
    <textarea id="f_json" spellcheck="false">${esc(JSON.stringify(obj, null, 2))}</textarea>`,
    async () => {
      const parsed = JSON.parse($("#f_json").value);
      if (await commit([{ op: "set", path: current.path, node: { [field]: parsed } }],
        field + " saved")) refresh();
    });
}

function childDialog() {
  const kinds = Object.keys(current.semantics.kinds || {});
  openDialog(`<h3>new child of <span class="mono">${esc(current.path || "/")}</span></h3>
    <label>id (path segment)</label><input id="f_id" class="mono" placeholder="my-node">
    <label>kind</label><input id="f_kind" list="kindlist" placeholder="free text — meaning is data">
    <datalist id="kindlist">${kinds.map(k => `<option>${esc(k)}</option>`).join("")}</datalist>
    <label>name</label><input id="f_cname">`,
    async () => {
      const id = $("#f_id").value.trim();
      if (!id) throw new Error("id required");
      const node = {};
      if ($("#f_kind").value.trim()) node.kind = $("#f_kind").value.trim();
      if ($("#f_cname").value.trim()) node.name = $("#f_cname").value.trim();
      if (await commit([{ op: "set", path: childPath(current.path, id), node }],
        "node created")) refresh();
    });
}

/* ---------- right pane: semantics ---------- */

function renderSide() {
  const { kinds = {}, rules = [], undefined_kinds = [] } = current.semantics;
  $("#kindstab").innerHTML =
    (undefined_kinds.length ? `<div class="err">no meaning written yet for:
       ${undefined_kinds.map(esc).join(", ")} — declare with tree_vocabulary</div>` : "") +
    (Object.keys(kinds).length ? Object.values(kinds).map(k => `
      <div class="kindcard">
        <span class="kind">${esc(k.kind)}</span>
        <div class="muted">${esc(k.description || "")}</div>
        ${k.params ? `<dl>${Object.entries(k.params).map(([p, d]) =>
          `<dt class="mono">${esc(p)}</dt><dd>${esc(d)}</dd>`).join("")}</dl>` : ""}
        ${k.links ? `<dl>${Object.entries(k.links).map(([l, d]) =>
          `<dt class="mono">→ ${esc(l)}</dt><dd>${esc(d)}</dd>`).join("")}</dl>` : ""}
      </div>`).join("")
     : `<p class="muted">no kinds in this slice</p>`);

  $("#rulestab").innerHTML = rules.length ? rules.map(r => `
    <div class="rulecard">
      <b>${esc(r.name)}</b> ${r.kind ? `<span class="chip kind">${esc(r.kind)}</span>` : ""}
      <div class="muted">${esc(r.description || "")}</div>
      <code>${esc(r.expr)}</code>
    </div>`).join("") : `<p class="muted">no rules apply here</p>`;
}

$("#runcheck").onclick = async () => {
  const r = await call("tree_check", { path: current.path });
  const text = r?.text || JSON.stringify(r);
  $("#checkout").innerHTML = text.split("\n").map(l => {
    const cls = l.startsWith("PASS") ? "PASS" : l.startsWith("FAIL") ? "FAIL" : "";
    return `<div class="line ${cls} mono">${esc(l)}</div>`;
  }).join("");
  // The report the user just ran is the freshest verdict there is; fold it back into
  // the outline's markers rather than letting the two views disagree on screen.
  await refreshReds();
  renderTree();
};

/* ---------- header: crumbs + search ---------- */

function renderCrumbs() {
  const segs = current.path ? current.path.split("/") : [];
  let acc = "";
  $("#crumbs").innerHTML = `<a data-p="">${esc(wsLabel)}</a>` + segs.map((s, i) => {
    acc += (i ? "/" : "") + s;
    const last = i === segs.length - 1;
    return `<span class="sep">/</span>` +
      (last ? `<span class="here">${esc(s)}</span>` : `<a data-p="${esc(acc)}">${esc(s)}</a>`);
  }).join("");
  $("#crumbs").querySelectorAll("a").forEach(a => a.onclick = () => go(a.dataset.p));
}

let wsLabel = "quern", searchTimer = null;
$("#search").oninput = () => {
  clearTimeout(searchTimer);
  const q = $("#search").value.trim();
  if (!q) { $("#hits").style.display = "none"; return; }
  searchTimer = setTimeout(async () => {
    const r = await call("tree_find", { query: q, limit: 15 });
    const hits = r?.matches || [];
    $("#hits").innerHTML = hits.map(h => `<div class="hit" data-p="${esc(h.path)}">
        <span class="mono">${esc(h.path)}</span>
        ${h.kind ? `<span class="chip kind">${esc(h.kind)}</span>` : ""}
        <div class="muted">${esc(h.name || "")}</div></div>`).join("")
      || `<div class="hit muted">no match</div>`;
    $("#hits").style.display = "block";
    $("#hits").querySelectorAll("[data-p]").forEach(x =>
      x.onclick = () => { $("#hits").style.display = "none"; $("#search").value = ""; go(x.dataset.p); });
  }, 250);
};
document.addEventListener("click", e => {
  if (!$("#searchbox").contains(e.target)) $("#hits").style.display = "none";
});

/* ---------- tabs ---------- */
document.querySelectorAll(".tabs button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("on", x === b));
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("on", t.id === b.dataset.tab));
});

/* ---------- boot ---------- */

function renderAll() { renderCrumbs(); renderTree(); renderNode(); renderSide(); }

function boot(rootSlice) {
  if (rootSlice.label) wsLabel = rootSlice.label;
  $("#wslabel").textContent = wsLabel;
  cache.set("", rootSlice);
  current = { path: "", node: rootSlice, semantics: rootSlice.semantics || {} };
  renderAll();
  // Verdicts arrive after the first paint, deliberately: a tree with expensive rules
  // should show its outline immediately and gain the RED markers a moment later, not
  // hold the whole view hostage to a check. A failure here costs the markers and is
  // swallowed — the outline is not worth losing to a red-marker fetch.
  refreshReds().then(renderTree).catch(() => {});
}

await initBridge();
let d = null;
try { d = await call("tree_app", {}); } catch {}
if (!d || d.error) d = await call("tree_get", { path: "", depth: 2 });
if (d && !d.error) boot(d);
else $("#node").innerHTML = `<p class="err">${esc(d?.error || "cannot reach the workspace")}</p>`;
</script>
</body>
</html>
