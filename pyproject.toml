[project]
name = "bom"
version = "0.1.0"
description = "Generic BOM/design substrate: a node tree whose semantics (vocabulary, rules) are data — private while it hardens, built to be open-sourced"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "pillow>=10",  # orthographic PNG views of the tree
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bom"]
