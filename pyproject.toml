[project]
name = "bom"
version = "0.1.0"
description = "BOM (Business Object Model): a generic node tree whose semantics (vocabulary, rules, solvers) are data — not Bill of Materials; private while it hardens, built to be open-sourced"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "wasmtime>=25",  # sandboxed solver runtime: fuel-metered, no ambient authority
]

[project.optional-dependencies]
# The geometry package (bom.geometry) is the only part that renders; a consumer
# that never touches shapes never needs Pillow.
geometry = ["pillow>=10"]
# bom.host registers the tree_* MCP tools over a Workspace; only a server needs it.
host = ["mcp[cli]>=1.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bom"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]
